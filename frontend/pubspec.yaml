name: frontend
description: "Feynman 'Teach a Student' — practice explaining concepts aloud to a curious AI student."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management — the spec requires Riverpod.
  flutter_riverpod: ^2.6.1

  # Speech-to-text. Exposes a sound-level stream we use to drive the orb amplitude.
  speech_to_text: ^7.0.0

  # Text-to-speech for the student's voice (higher pitch, slower rate).
  flutter_tts: ^4.2.3

  # Local persistence. Hive chosen over Isar/Drift: pure-Dart, zero native
  # build step, and our data is small structured JSON (sessions + versioned
  # attempts) that serialises cleanly without code generation.
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking to the backend proxy.
  http: ^1.2.2

  # Inter variable font for the typographic hierarchy.
  google_fonts: ^6.2.1
  lucide_icons_flutter: ^3.0.0

  # QR duel flow: generate invite codes, scan them via the camera, and pick
  # an image from the gallery to decode a code offline.
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  image_picker: ^1.1.2

  # Auth + profile sync backend.
  supabase_flutter: ^2.5.6
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Generates platform-specific launcher icons from a single source image.
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - lib/assets/mascot/

flutter_launcher_icons:
  image_path: "lib/assets/logo.png"
  android: true
  ios: true
  # Android adaptive icon (API 26+): foreground is inset into the launcher
  # "safe zone" so circular/squircle masks don't clip the seal; the white
  # background matches the logo's own surround.
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "lib/assets/logo.png"
  web:
    generate: true
  windows:
    generate: true
    icon_size: 256
  macos:
    generate: true
  remove_alpha_ios: true

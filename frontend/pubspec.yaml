name: frontend
description: "Feynman 'Teach a Student' — practice explaining concepts aloud to a curious AI student."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management — the spec requires Riverpod.
  flutter_riverpod: ^2.6.1

  # Speech-to-text. Exposes a sound-level stream we use to drive the orb amplitude.
  speech_to_text: ^7.0.0

  # Text-to-speech for the student's voice (higher pitch, slower rate).
  flutter_tts: ^4.2.3

  # Local persistence. Hive chosen over Isar/Drift: pure-Dart, zero native
  # build step, and our data is small structured JSON (sessions + versioned
  # attempts) that serialises cleanly without code generation.
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking to the backend proxy.
  http: ^1.2.2

  # Inter variable font for the typographic hierarchy.
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
